; ═══════════════════════════════════════════════════════════════
;  🔥 INFERNO SLATE — Blueprint Graph Editor Colors
; ═══════════════════════════════════════════════════════════════
;  
;  HOW TO INSTALL:
;  ───────────────
;  1. Open your project's Config folder:
;        {YourProject}/Config/
;  
;  2. Open (or create) the file:
;        DefaultEditorPerProjectUserSettings.ini
;  
;  3. Copy the [/Script/GraphEditor.GraphEditorSettings] section
;     below and paste it into that file.
;  
;  4. Restart the Unreal Editor.
;  
;  ALTERNATIVELY, you can change these in-editor:
;     Edit → Editor Preferences → Content Editors → Graph Editors
;
;  NOTE: Colors use linear color space (R, G, B, A) values.
; ═══════════════════════════════════════════════════════════════

[/Script/GraphEditor.GraphEditorSettings]

; ─── Node Title Colors ────────────────────────────────────────

; Function call nodes (standard impure functions)
; Using Crimson Red (#C00707) — the primary Inferno accent
FunctionCallNodeTitleColor=(R=0.527115,G=0.002125,B=0.002125,A=1.000000)

; Pure function call nodes (no exec pins)
; Using Molten Gold (#FFB347) — warm and distinct from impure
PureFunctionCallNodeTitleColor=(R=1.000000,G=0.450786,B=0.063010,A=1.000000)

; Event nodes (BeginPlay, Tick, etc.)
; Using Inferno Orange (#FF5500) — fiery, attention-grabbing
EventNodeTitleColor=(R=1.000000,G=0.090842,B=0.000000,A=1.000000)

; Parent function call nodes
; Using Ember Glow (#FF9A56) — slightly softer orange
ParentFunctionCallNodeTitleColor=(R=1.000000,G=0.323143,B=0.093059,A=1.000000)

; Result nodes (function outputs)
; Using Royal Blue (#2B5797) — cool contrast to warm nodes
ResultNodeTitleColor=(R=0.024158,G=0.095307,B=0.309469,A=1.000000)

; ─── Default Node Colors ──────────────────────────────────────

; The default body color for nodes
; Using Dark Slate (#25343F)
DefaultCommentNodeTitleColor=(R=0.018500,G=0.034340,B=0.049707,A=1.000000)

; ─── Pin Type Colors ──────────────────────────────────────────
; These control the wire/connection colors in the Blueprint graph

; Execution pins (white triangle flow arrows)
; Using Silver (#BFC9D1) — clean and visible
ExecutionPinTypeColor=(R=0.520996,G=0.584078,B=0.637597,A=1.000000)

; Boolean pins
; Using Crimson Red (#C00707) — true/false as fire
BooleanPinTypeColor=(R=0.527115,G=0.002125,B=0.002125,A=1.000000)

; Byte pins
; Using Verdant Green (#2D8F4E)
BytePinTypeColor=(R=0.026241,G=0.274677,B=0.076185,A=1.000000)

; Integer pins 
; Using Royal Blue (#2B5797) — cool number tone
IntPinTypeColor=(R=0.024158,G=0.095307,B=0.309469,A=1.000000)

; Integer64 pins
; Using slightly lighter Blue
Int64PinTypeColor=(R=0.048172,G=0.141263,B=0.400000,A=1.000000)

; Float/Double pins
; Using Verdant Green (#2D8F4E)
FloatPinTypeColor=(R=0.026241,G=0.274677,B=0.076185,A=1.000000)
DoublePinTypeColor=(R=0.026241,G=0.274677,B=0.076185,A=1.000000)

; Name pins
; Using Mystic Purple (#6B4C9A)
NamePinTypeColor=(R=0.147027,G=0.072272,B=0.323143,A=1.000000)

; String pins
; Using Flamingo Pink (#D4577A)
StringPinTypeColor=(R=0.658375,G=0.095307,B=0.194618,A=1.000000)

; Text pins
; Using softer Pink
TextPinTypeColor=(R=0.500000,G=0.120000,B=0.200000,A=1.000000)

; Struct pins
; Using Royal Blue (#2B5797)
StructPinTypeColor=(R=0.024158,G=0.095307,B=0.309469,A=1.000000)

; Object pins
; Using Royal Blue
ObjectPinTypeColor=(R=0.024158,G=0.095307,B=0.309469,A=1.000000)

; SoftObject pins
SoftObjectPinTypeColor=(R=0.048172,G=0.141263,B=0.400000,A=1.000000)

; SoftClass pins
SoftClassPinTypeColor=(R=0.147027,G=0.072272,B=0.323143,A=1.000000)

; Interface pins
; Using Purple
InterfacePinTypeColor=(R=0.147027,G=0.072272,B=0.323143,A=1.000000)

; Class pins
; Using Purple (#6B4C9A)
ClassPinTypeColor=(R=0.147027,G=0.072272,B=0.323143,A=1.000000)

; Vector pins (FVector)
; Using Molten Gold (#FFB347) — warm and spatial
VectorPinTypeColor=(R=1.000000,G=0.450786,B=0.063010,A=1.000000)

; Rotator pins
; Using Ember Glow (#FF9A56) — slightly different from Vector  
RotatorPinTypeColor=(R=1.000000,G=0.323143,B=0.093059,A=1.000000)

; Transform pins
; Using Inferno Orange (#FF5500)
TransformPinTypeColor=(R=1.000000,G=0.090842,B=0.000000,A=1.000000)

; Wildcard pins
; Using Silver (#BFC9D1)
WildcardPinTypeColor=(R=0.520996,G=0.584078,B=0.637597,A=1.000000)

; Delegate pins
; Using Crimson Red
DelegatePinTypeColor=(R=0.527115,G=0.002125,B=0.002125,A=1.000000)

; Index/Enum pins
IndexPinTypeColor=(R=0.258183,G=0.111932,B=0.045186,A=1.000000)

; ─── Tracing / Debug Colors ───────────────────────────────────

; Active exec wire debugging color
TraceAttackColor=(R=1.000000,G=0.090842,B=0.000000,A=1.000000)

; Sustained exec wire color
TraceSustainColor=(R=1.000000,G=0.450786,B=0.063010,A=1.000000)

; Release/fade exec wire color
TraceReleaseColor=(R=0.527115,G=0.002125,B=0.002125,A=1.000000)

; ─── Selection Colors ─────────────────────────────────────────

; Default data wire thickness
DefaultDataWireThickness=1.5

; Default execution wire thickness
DefaultExecutionWireThickness=3.0
